<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Día del Padre</title>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            color: #ffffff;
            overflow: hidden;
            background-color: #070911;
            background-image:
                radial-gradient(circle at top left, rgba(169, 234, 255, 0.18), transparent 20%),
                radial-gradient(circle at bottom right, rgba(255, 204, 92, 0.16), transparent 18%);
        }

        /* --- CONTENEDOR DE FONDOS DINÁMICOS --- */
        #dynamic-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            transition: background 0.8s ease;
            overflow: hidden;
            background: radial-gradient(circle at 25% 25%, rgba(255,255,255,0.08), transparent 18%),
                        radial-gradient(circle at 80% 15%, rgba(0,255,191,0.1), transparent 16%),
                        radial-gradient(circle at 70% 75%, rgba(255,100,200,0.08), transparent 14%);
            animation: backgroundShift 15s ease infinite;
        }

        #confetti-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 5;
        }

        /* --- TEXTO DORADO FINAL --- */
        .celebration-text {
            position: absolute;
            top: 10vh;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: 90%; 
            max-width: 600px;
            text-align: center;
            color: #ffe28a;
            font-size: 1.35rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            line-height: 1.4;
            text-shadow: 0 0 15px rgba(255, 226, 138, 0.85), 0 0 30px rgba(255, 182, 55, 0.55);
            opacity: 0;
            z-index: 10;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }

        .celebration-text.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* --- ANIMACIONES CORREGIDAS PARA EMOJIS Y ESCUDOS --- */
        .emoji {
            position: absolute;
            top: -100px; /* <--- CLAVE: Arrancan ocultos arriba */
            font-size: 2.4rem;
            opacity: 0.55;
            animation: floatDownEmoji linear infinite;
        }

        .shield-drop {
            position: absolute;
            top: -150px; /* <--- CLAVE: Arrancan ocultos arriba */
            animation: floatDownShield linear infinite;
        }

        /* Transform hace que caigan desde donde están hacia el fondo de la pantalla */
        @keyframes floatDownEmoji {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(130vh) rotate(360deg); }
        }

        @keyframes floatDownShield {
            0% { transform: translateY(0) rotate(-15deg); }
            100% { transform: translateY(130vh) rotate(15deg); }
        }

        @keyframes backgroundShift {
            0%, 100% { background-position: 0% 0%, 100% 10%, 70% 100%; }
            50% { background-position: 10% 20%, 85% 5%, 60% 90%; }
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @keyframes buttonGlow {
            0%, 100% { box-shadow: 0 10px 20px rgba(0,0,0,0.25), 0 0 0 rgba(105, 214, 255, 0); }
            50% { box-shadow: 0 10px 24px rgba(0,0,0,0.3), 0 0 18px rgba(105, 214, 255, 0.28); }
        }

        /* --- TARJETAS E INTERFAZ --- */
        .top-instructions {
            color: #f8f9fb;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.45);
            z-index: 10;
        }

        .flashcard-container {
            width: 90%;
            max-width: 600px;
            height: 400px;
            perspective: 1500px;
            margin-bottom: 20px;
            z-index: 10;
            user-select: none;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .flashcard:hover {
            transform: scale(1.02);
        }

        .flashcard.flipped {
            transform: rotateX(180deg) scale(1);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: rgba(36, 39, 44, 0.95);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 60px rgba(0,0,0,0.55), 0 0 20px rgba(0,0,0,0.18);
            overflow: hidden;
        }

        .card-face::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 25%);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #c7d0dc;
            font-weight: 500;
        }

        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .front .question {
            font-size: 28px;
            line-height: 1.35;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .back {
            transform: rotateX(180deg);
            background-color: #16181d;
        }

        .back .photo-container {
            width: 100%;
            height: 180px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
        }

        .back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(1.05) contrast(1.05);
        }

        .back .answer {
            font-size: 17px;
            line-height: 1.6;
            color: #e6edf5;
            max-width: 100%;
        }

        .flip-hint {
            font-size: 13px;
            color: #b8c1cc;
            margin-top: auto;
            text-align: center;
            opacity: 0.72;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 10;
            padding-bottom: 15px;
        }

        .btn-nav {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: rgba(35, 37, 40, 0.96);
            border: 2px solid rgba(255,255,255,0.18);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            animation: buttonGlow 4.5s ease-in-out infinite;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-nav:hover:not(:disabled) {
            background-color: rgba(60, 64, 72, 1);
            transform: scale(1.08);
        }

        .btn-nav:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: scale(1);
        }

        @media (max-width: 600px) {
            .flashcard-container {
                height: 55vh;
                max-height: 420px;
            }
            .front .question { font-size: 22px; }
            .controls { margin-top: -5px; }
            .celebration-text { 
                top: 5vh; 
                font-size: 1.1rem; 
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div id="confetti-container"></div>
    <div class="celebration-text" id="celebrationText">¡Gracias por ser el mejor papá!</div>

    <div class="top-instructions">
        Presiona "Espacio" o haz clic en la tarjeta para voltearla
    </div>

    <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
            
            <div class="card-face front">
                <div class="card-header">
                    <span id="counterFront">1/10</span>
                    <span>⋮</span>
                </div>
                <div class="card-content">
                    <div class="question" id="questionText">Cargando...</div>
                </div>
                <div class="flip-hint">Ver respuesta</div>
            </div>

            <div class="card-face back">
                <div class="card-header">
                    <span id="counterBack">1/10</span>
                    <span>⋮</span>
                </div>
                <div class="card-content">
                    <div class="photo-container">
                        <img id="cardImage" src="" alt="Foto familiar">
                    </div>
                    <div class="answer" id="answerText">Cargando...</div>
                </div>
            </div>

        </div>
    </div>

    <div class="controls">
        <button class="btn-nav" id="btnPrev" onclick="prevCard()">←</button>
        <button class="btn-nav" id="btnNext" onclick="nextCard()">→</button>
    </div>

    <script>
        // --- DATOS DE LAS FLASHCARDS ---
        const cardsData = [
            {
                pregunta: "¿En qué año comenzó la historia del mejor papá?",
                respuesta: "1989. El año de tu nacimiento y el inicio de todo.",
                imagen: "1_nacimiento.jpg",
                bgColor: "linear-gradient(135deg, #1f4037 0%, #99f2c8 100%)",
                bgType: "emojis",
                emojis: ['🏥', '🍼', '🧸', '🛏️']
            },
            {
                pregunta: "Un viaje al pasado... ¿Te acordás de esta época?",
                respuesta: "Vos en el jardín. Seguro ya eras detallista y tranquilo desde chiquito.",
                imagen: "2_jardin.jpg",
                bgColor: "linear-gradient(135deg, #fceabb 0%, #f8b500 100%)",
                bgType: "emojis",
                emojis: ['🖍️', '🎨', '🧩', '🧸']
            },
            {
                pregunta: "Principios de 2005. Una fecha que cambió la historia.",
                respuesta: "El día que conociste a mamá. Ahí se plantó la semilla de nuestra familia.",
                imagen: "3_mama.jpg",
                bgColor: "linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%)",
                bgType: "emojis",
                emojis: ['❤️', '👩‍❤️‍👨', '💍', '✨']
            },
            {
                pregunta: "12 de diciembre de 2007. ¿Qué pasó de importante?",
                respuesta: "¡Nací yo! Tiago. Tu primer gran dolor de cabeza (y orgullo).",
                imagen: "4_nacimiento_tiago.jpg",
                bgColor: "linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)",
                bgType: "emojis",
                emojis: ['👶', '👨‍👩‍👦', '🍼', '💙']
            },
            {
                pregunta: "Recuerdos de mi infancia a tu lado...",
                respuesta: "Siempre acompañándome, enseñándome cosas y haciéndome reír con tus chistes.",
                imagen: "5_tiago_chico.jpg",
                bgColor: "linear-gradient(135deg, #f6d365 0%, #fda085 100%)",
                bgType: "emojis",
                emojis: ['🚲', '🪁', '⚽', '🤣']
            },
            {
                pregunta: "Una nueva etapa: Mi inicio en la escuela.",
                respuesta: "Nunca faltó tu apoyo incondicional. Un pilar en cada paso que daba.",
                imagen: "6_escuela.jpg",
                bgColor: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
                bgType: "emojis",
                emojis: ['🎒', '📚', '✏️', '🏫']
            },
            {
                pregunta: "El laburante número uno.",
                respuesta: "Dándolo todo en la empresa. Un ejemplo gigante de esfuerzo silencioso.",
                imagen: "7_empresa.jpg",
                bgColor: "linear-gradient(135deg, #434343 0%, #000000 100%)",
                bgType: "emojis",
                emojis: ['💻', '🚌', '🏢', '🚍', '🖱️']
            },
            {
                pregunta: "9 de diciembre de 2018. Madrid.",
                respuesta: "¡Y va el tercero! Una de las mayores alegrías compartidas gracias a River. Gracias por esta pasión.",
                imagen: "8_river.jpg",
                bgType: "river"
            },
            {
                pregunta: "La familia se agranda. Una nueva generación.",
                respuesta: "El nacimiento de Mateo. Miralo de fiero que era de chiquito.",
                imagen: "9_mateo.jpg",
                bgColor: "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)",
                bgType: "emojis",
                emojis: ['👶', '👦', '👨‍👩‍👦‍👦', '🍼', '🎉']
            },
            {
                pregunta: "¿Qué te puedo decir hoy?",
                respuesta: "Gracias por los detalles, los asados y los chistes. Sos el mejor papá del mundo. ¡Feliz día!",
                imagen: "10_actual.jpg",
                bgColor: "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)",
                bgType: "emojis",
                emojis: ['🥩', '🍷', '🏆', '❤️']
            }
        ];

        // --- LÓGICA DEL SISTEMA ---
        let currentIndex = 0;
        const flashcard = document.getElementById('flashcard');
        const questionText = document.getElementById('questionText');
        const answerText = document.getElementById('answerText');
        const cardImage = document.getElementById('cardImage');
        const counterFront = document.getElementById('counterFront');
        const counterBack = document.getElementById('counterBack');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const dynamicBg = document.getElementById('dynamic-bg');
        const confettiContainer = document.getElementById('confetti-container');
        const celebrationText = document.getElementById('celebrationText');

        function randomBetween(min, max) {
            return Math.random() * (max - min) + min;
        }

        function buildBackground(data) {
            dynamicBg.innerHTML = '';

            if (data.bgType === 'river') {
                dynamicBg.style.background = 'linear-gradient(to bottom left, #ffffff 40%, #E30613 40%, #E30613 60%, #ffffff 60%)';
                
                for (let i = 0; i < 35; i++) {
                    const shieldEl = document.createElement('img');
                    shieldEl.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Logo_River_Plate.png/500px-Logo_River_Plate.png';
                    shieldEl.className = 'shield-drop';
                    shieldEl.style.width = `${randomBetween(35, 75)}px`;
                    shieldEl.style.left = `${randomBetween(-5, 95)}vw`;
                    shieldEl.style.opacity = `${randomBetween(0.6, 0.95)}`;
                    shieldEl.style.animationDuration = `${randomBetween(6, 11)}s`;
                    shieldEl.style.animationDelay = `-${randomBetween(0, 15)}s`;
                    dynamicBg.appendChild(shieldEl);
                }
            } else if (data.bgType === 'emojis') {
                dynamicBg.style.background = data.bgColor;
                
                for (let i = 0; i < 45; i++) {
                    const emojiEl = document.createElement('div');
                    emojiEl.className = 'emoji';
                    emojiEl.innerText = data.emojis[Math.floor(Math.random() * data.emojis.length)];
                    emojiEl.style.left = `${randomBetween(-10, 100)}vw`;
                    emojiEl.style.fontSize = `${randomBetween(1.8, 3.2)}rem`;
                    emojiEl.style.opacity = `${randomBetween(0.3, 0.8)}`;
                    emojiEl.style.animationDuration = `${randomBetween(8, 14)}s`;
                    emojiEl.style.animationDelay = `-${randomBetween(0, 20)}s`;
                    dynamicBg.appendChild(emojiEl);
                }
            }
        }

        function createConfettiPiece(color) {
            const element = document.createElement('span');
            element.className = 'confetti-piece';
            element.style.position = 'absolute';
            element.style.width = `${randomBetween(8, 14)}px`;
            element.style.height = `${randomBetween(10, 18)}px`;
            element.style.background = color;
            element.style.left = `${randomBetween(20, 80)}vw`;
            element.style.top = `${randomBetween(-10, -4)}vh`;
            element.style.opacity = randomBetween(0.7, 1);
            element.style.borderRadius = '3px';
            element.style.transform = `rotate(${randomBetween(0, 360)}deg)`;
            element.style.animation = `confettiFall ${randomBetween(2.5, 4.5)}s ease forwards`;
            return element;
        }

        function launchConfetti(count = 30) {
            const colors = ['#ffdd57', '#ff5c8a', '#38d9a9', '#74c0fc', '#d9480f', '#845ef7'];
            for (let i = 0; i < count; i++) {
                const piece = createConfettiPiece(colors[Math.floor(Math.random() * colors.length)]);
                confettiContainer.appendChild(piece);
                piece.addEventListener('animationend', () => piece.remove());
            }
        }

        function showCelebrationText(visible) {
            celebrationText.classList.toggle('visible', visible);
        }

        function updateUI() {
            const data = cardsData[currentIndex];
            questionText.innerText = data.pregunta;
            answerText.innerText = data.respuesta;
            cardImage.src = data.imagen;
            
            const textCounter = `${currentIndex + 1}/${cardsData.length}`;
            counterFront.innerText = textCounter;
            counterBack.innerText = textCounter;
            
            buildBackground(data);
            
            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === cardsData.length - 1;
            showCelebrationText(false);
        }

        function flipCard() {
            flashcard.classList.toggle('flipped');
            const data = cardsData[currentIndex];
            
            if (flashcard.classList.contains('flipped')) {
                if (currentIndex === cardsData.length - 1) {
                    showCelebrationText(true);
                    launchConfetti(40);
                } else if (data.bgType === 'river') {
                    launchConfetti(20);
                }
            }
        }

        function nextCard() {
            if (currentIndex < cardsData.length - 1) {
                if (flashcard.classList.contains('flipped')) {
                    flashcard.classList.remove('flipped');
                    setTimeout(() => {
                        currentIndex++;
                        updateUI();
                    }, 400);
                } else {
                    currentIndex++;
                    updateUI();
                }
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                if (flashcard.classList.contains('flipped')) {
                    flashcard.classList.remove('flipped');
                    setTimeout(() => {
                        currentIndex--;
                        updateUI();
                    }, 400);
                } else {
                    currentIndex--;
                    updateUI();
                }
            }
        }

        // --- ASIGNACIÓN DE EVENTOS ---
        flashcard.addEventListener('click', flipCard);

        document.addEventListener('keydown', (e) => {
            const isSpace = e.code === 'Space' || e.code === 'Spacebar' || e.key === ' ';
            if (isSpace) {
                e.preventDefault();
                flipCard();
            } else if (e.code === 'ArrowRight' || e.key === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft' || e.key === 'ArrowLeft') {
                prevCard();
            }
        });

        // Iniciar
        updateUI();
    </script>
</body>
</html>
